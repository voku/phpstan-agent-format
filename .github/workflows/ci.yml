name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Lint
        run: composer lint

      - name: Test
        run: composer test

      - name: PHPStan (default formatter)
        run: vendor/bin/phpstan analyse --configuration phpstan.neon.dist --no-progress

      - name: PHPStan (agent formatter dogfood)
        run: vendor/bin/phpstan analyse --configuration phpstan.neon.dist --error-format=agent --no-progress

      - name: PHPStan (default vs grouped report compare)
        run: composer phpstan-compare

      - name: PHPStan (reduced grouped report compare)
        run: composer phpstan-compare-reduced

      - name: PHPStan (agent formatter fixture dogfood)
        run: |
          set +e
          vendor/bin/phpstan analyse --configuration tests/Config/phpstan-agent-fixtures.neon --error-format=agent --no-progress > /tmp/phpstan-agent-fixtures.json
          status=$?
          set -e
          test "$status" -eq 1
          php -r '$payload = json_decode(file_get_contents("/tmp/phpstan-agent-fixtures.json"), true, 512, JSON_THROW_ON_ERROR); if (($payload["summary"]["totalIssues"] ?? 0) < 1) { fwrite(STDERR, "Expected fixture issues.\n"); exit(1); }'

      - name: PHPStan (agent formatter clean fixture dogfood)
        run: |
          vendor/bin/phpstan analyse --configuration tests/Config/phpstan-agent-clean.neon --error-format=agent --no-progress > /tmp/phpstan-agent-clean.json
          php -r 'require "vendor/autoload.php"; $payload = HelgeSverre\Toon\Toon::decode(file_get_contents("/tmp/phpstan-agent-clean.json")); if (($payload["summary"]["totalIssues"] ?? -1) !== 0) { fwrite(STDERR, "Expected zero fixture issues.\n"); exit(1); }'

      - name: PHPStan (agent formatter reduced fixture dogfood)
        run: |
          set +e
          vendor/bin/phpstan analyse --configuration tests/Config/phpstan-agent-reduced.neon --error-format=agent --no-progress > /tmp/phpstan-agent-reduced.json
          status=$?
          set -e
          test "$status" -eq 1
          php -r '$payload = json_decode(file_get_contents("/tmp/phpstan-agent-reduced.json"), true, 512, JSON_THROW_ON_ERROR); if (($payload["summary"]["tokenStats"]["wasReduced"] ?? false) !== true) { fwrite(STDERR, "Expected reduced payload.\n"); exit(1); } if (($payload["summary"]["suppressedDuplicates"] ?? 0) < 1) { fwrite(STDERR, "Expected suppressed duplicates.\n"); exit(1); }'
